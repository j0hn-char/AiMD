services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    volumes:
      - ./chroma_db:/app/chroma_db
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/"]
      interval: 5s
      timeout: 5s
      retries: 5

  frontend:
    build: ./frontend/AiMD
    ports:
      - "5173:5173"
    depends_on:
      backend:
        condition: service_healthy