<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="circleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0e7490"/>
      <stop offset="100%" style="stop-color:#0f766e"/>
    </linearGradient>
    <linearGradient id="crossGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#38bdf8"/>
      <stop offset="100%" style="stop-color:#2dd4bf"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <circle cx="100" cy="100" r="70" fill="url(#circleGrad)" opacity="0.15" stroke="url(#crossGrad)" stroke-width="1.5"/>
  <rect x="88" y="60" width="24" height="80" rx="4" fill="url(#crossGrad)" filter="url(#glow)" opacity="0.9"/>
  <rect x="60" y="88" width="80" height="24" rx="4" fill="url(#crossGrad)" filter="url(#glow)" opacity="0.9"/>
  <polyline points="55,100 72,100 80,80 90,120 100,90 110,110 120,100 145,100"
    fill="none" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"
    opacity="0.6" filter="url(#glow)"/>
</svg>